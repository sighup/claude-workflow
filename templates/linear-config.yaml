# Claude Workflow — Linear Integration Configuration
#
# This file is created by /cw-linear-init and lives at .claude-workflow/config.yaml
# in your project root. It configures the heartbeat loop that pulls work from
# Linear and feeds it into the cw pipeline.

version: 1

linear:
  # Your Linear team key (e.g., "ENG", "PRODUCT")
  team: "{{TEAM}}"

  # The Linear user name that issues are assigned to (your bot/agent identity)
  user_name: "{{USER_NAME}}"

heartbeat:
  # Maximum issues to process per heartbeat cycle
  max_issues_per_heartbeat: 2

  # Hours before a stale agent-working lock is auto-cleared
  stale_lock_hours: 1

  # Minutes to wait before retrying after an error
  error_cooldown_minutes: 30

  # Optional quiet hours — heartbeat skips execution during this window
  # quiet_hours:
  #   enabled: true
  #   start: "18:00"
  #   end: "09:00"
  #   timezone: "America/New_York"

labels:
  # Label groups in Linear are single-select: only one label from a group
  # can be applied to an issue at a time.

  # State label group (single-select) — agent processing state
  state_group: "cw-state"
  states:
    - "agent-working"
    - "agent-blocked"

  # Phase label group (single-select) — lifecycle phase tracking
  phase_group: "cw-phase"
  phases:
    - "needs-research"
    - "ready-for-spec"
    - "spec-complete"

  # Standalone label applied to sub-issues created from demoable units
  managed: "cw-managed"

pipeline:
  # Which cw stages run automatically per heartbeat
  auto_spec: true
  auto_plan: true
  auto_dispatch: true
  auto_validate: true

  # Human gates — disabled by default
  auto_review: false
  auto_pr: false

  # Research phase — run cw-research before spec if issue seems vague
  auto_research: false

  # E2E testing — run cw-testing per sub-issue after validation
  auto_testing: true

  # Parent-level review — run cw-review-team on full diff after all sub-issues complete
  parent_review: false

  # Branch strategy for sub-issue PRs
  #   "direct"      — each sub-issue PR merges to main independently
  #   "integration" — sub-issue branches merge into feature/{feature-slug}, then one PR to main
  branch_strategy: "direct"
